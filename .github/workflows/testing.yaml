name: Testing

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

permissions: read-all

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize dependencies
        run: .\PSFoundation.ps1 init

      - name: Format check
        run: .\PSFoundation.ps1 format -Check

      - name: Lint
        run: .\PSFoundation.ps1 lint

      - name: Test
        run: .\PSFoundation.ps1 test
