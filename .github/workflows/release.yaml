name: "Release"

on:
  workflow_dispatch:
  repository_dispatch:
    types: [release]
  pull_request:
    branches:
      - "main"

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: pwsh

concurrency:
  group: "${{ github.workflow }}@${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        id: semantic
        with:
          semantic_version: 24
          branches: |
            [
              'main',
              'next'
            ]
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            conventional-changelog-conventionalcommits@8.0.0

      - name: Publish PSGallery Release
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          Write-Host "Publishing new release: ${{ steps.semantic.outputs.new_release_version }} to PSGallery"
          .\PSFoundation.ps1 release -NuGetApiKey ${{ secrets.NUGET_API_KEY }}
